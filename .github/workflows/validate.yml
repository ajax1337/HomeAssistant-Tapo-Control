name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          ignore: brands

  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Compile all Python files
        run: python -m compileall -q custom_components/
      - name: Validate all JSON files
        run: |
          python - <<'EOF'
          import glob
          import json

          for f in glob.glob("custom_components/**/*.json", recursive=True) + ["hacs.json"]:
              json.load(open(f))
              print(f"OK {f}")
          EOF
